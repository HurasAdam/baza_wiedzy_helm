apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.forgejoDeps.db.pvc.name }}
  namespace: {{ .Values.namespace }}
spec:
  storageClassName: ""
  volumeName: {{ .Values.forgejoDeps.db.pv.name }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.forgejoDeps.db.pvc.storage }}
