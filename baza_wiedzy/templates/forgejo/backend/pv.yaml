apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.forgejoDeps.navidrome.data.pv.name }}
spec:
  storageClassName: ""
  capacity:
    storage: {{ .Values.forgejoDeps.navidrome.data.pv.storage }}
  accessModes:
    - ReadWriteMany
  hostPath:
    path: {{ .Values.forgejoDeps.navidrome.data.pv.hostPath }}
